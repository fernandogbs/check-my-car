<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f8fafc; color: #0f172a; padding: 24px; }
      .card { max-width: 560px; background: white; border: 1px solid rgba(15,23,42,.08); border-radius: 16px; padding: 20px; box-shadow: 0 10px 30px rgba(2,6,23,.06); }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { margin: 0; color: #475569; line-height: 1.5; }
      a { color: #1d4ed8; font-weight: 600; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>We couldn’t reach the server. Please check your connection and try again.</p>
      <p style="margin-top: 16px;"><a href="/">Go back</a></p>
    </div>
  </body>
</html>
